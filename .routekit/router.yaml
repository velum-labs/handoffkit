endpoints:
  - endpointId: kimi
    model: moonshotai/kimi-k2-thinking
    provider: openrouter
    baseUrl: https://openrouter.ai/api/v1
    dialect: openai
    apiKeyEnv: OPENROUTER_API_KEY
    capabilities:
      streaming: supported
      tools: supported
      images: unknown
      reasoning_controls: supported
  - endpointId: qwen3
    model: qwen/qwen3-coder
    provider: openrouter
    baseUrl: https://openrouter.ai/api/v1
    dialect: openai
    apiKeyEnv: OPENROUTER_API_KEY
    capabilities:
      streaming: supported
      tools: supported
      images: unknown
      reasoning_controls: supported
defaultEndpointId: kimi
