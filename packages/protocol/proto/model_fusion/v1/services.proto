syntax = "proto3";

package velum.model_fusion.v1;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_package = "com.velum.model_fusion.v1";

// Consumer compatibility snapshot for model-fusion service boundaries.
//
// Canonical source belongs in FusionKit. HandoffKit keeps this narrow snapshot
// only until it can consume generated protocol packages from that source.
//
// The durable audit format remains the JSON Schema record set represented by
// persisted_json below. Protobuf/Buf is the source of truth for service and SDK
// boundaries; OpenAPI, if needed, is generated from that IDL and not
// hand-authored.

message PersistedJsonRecord {
  string schema = 1;
  string schema_version = 2;
  string schema_bundle_hash = 3;
  bytes persisted_json = 4;
}

message ArtifactRef {
  string artifact_id = 1;
  string kind = 2;
  string hash = 3;
  string redaction_status = 4;
}

message HarnessExecutionRequest {
  string request_id = 1;
  string task_id = 2;
  string source_repo = 3;
  string base_git_sha = 4;
  string harness_kind = 5;
  string prompt_hash = 6;
  repeated string allowed_tools = 7;
  string side_effects = 8;
  PersistedJsonRecord harness_run_request = 9;
}

message HarnessExecutionResult {
  string request_id = 1;
  string result_id = 2;
  string status = 3;
  repeated string candidate_ids = 4;
  repeated ArtifactRef artifacts = 5;
  PersistedJsonRecord harness_run_result = 6;
}

message CursorHarnessOutputRequest {
  string request_id = 1;
  string cursor_session_id = 2;
  PersistedJsonRecord harness_run_result = 3;
  repeated ArtifactRef artifacts = 4;
}

message CursorHarnessOutputResult {
  string request_id = 1;
  string status = 2;
  google.protobuf.Timestamp accepted_at = 3;
}

message ProviderCapabilityRequest {
  string provider_id = 1;
  string model = 2;
}

message ProviderCapabilityResult {
  string provider_id = 1;
  string model = 2;
  repeated string capabilities = 3;
  PersistedJsonRecord model_call_record = 4;
}

message ModelCallMetadataRequest {
  string call_id = 1;
  string provider_id = 2;
  PersistedJsonRecord model_call_record = 3;
}

message ModelCallMetadataResult {
  string call_id = 1;
  string status = 2;
}

message BenchmarkExecutionEnvelope {
  string benchmark_id = 1;
  string task_id = 2;
  PersistedJsonRecord benchmark_task = 3;
  repeated HarnessExecutionRequest harness_requests = 4;
}

message BenchmarkJoinEnvelope {
  string benchmark_id = 1;
  repeated HarnessExecutionResult harness_results = 2;
  PersistedJsonRecord ensemble_receipt = 3;
}

message BenchmarkExecutionResult {
  string benchmark_id = 1;
  string status = 2;
  BenchmarkJoinEnvelope join_envelope = 3;
}

service HarnessExecutorService {
  // fusionkit -> handoffkit coding task execution boundary.
  rpc ExecuteHarnessTask(HarnessExecutionRequest) returns (HarnessExecutionResult);
}

service CursorHarnessService {
  // cursorkit adapter output boundary.
  rpc PublishCursorHarnessOutput(CursorHarnessOutputRequest) returns (CursorHarnessOutputResult);
}

service MlxProviderService {
  // mlx-lm provider capability and model-call metadata boundary.
  rpc GetProviderCapabilities(ProviderCapabilityRequest) returns (ProviderCapabilityResult);
  rpc RecordModelCallMetadata(ModelCallMetadataRequest) returns (ModelCallMetadataResult);
}

service BenchmarkExecutionService {
  // fusionkit benchmark execution and join-envelope boundary.
  rpc ExecuteBenchmark(BenchmarkExecutionEnvelope) returns (BenchmarkExecutionResult);
  rpc JoinBenchmarkResults(BenchmarkJoinEnvelope) returns (BenchmarkExecutionResult);
}
