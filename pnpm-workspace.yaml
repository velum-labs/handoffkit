packages:
  - "packages/*"
  - "examples/*"
  - "apps/*"

# Build scripts stay disabled globally by .npmrc. This allowlist documents the
# only native dependencies the application workspaces may rebuild explicitly.
onlyBuiltDependencies:
  - esbuild
  - sharp

# Keep security overrides in the workspace manifest so both the pinned pnpm 10
# install and CI's pnpm 11 audit apply them.
overrides:
  "brace-expansion@>=3.0.0 <5.0.7": ">=5.0.7 <6"
  "undici@>=7.0.0 <7.28.0": ">=7.28.0 <8"

# @ai-sdk/harness-claude-code declares @anthropic-ai/claude-agent-sdk as a
# peer, but never executes it on the host: the adapter ships a bridge bundle
# whose pinned dependencies (including the agent SDK) are installed *inside*
# the sandbox by its bootstrap recipe, with a frozen lockfile. Installing the
# SDK on the runner host would add an unused dependency tree (plus its own
# peer cascade) to the trust surface for nothing, so the missing peer is
# ignored explicitly here instead.
#
# @ai-sdk/harness-pi declares @earendil-works/pi-coding-agent (a ~12 MB host
# coding-agent runtime) as a peer. Unlike claude-code it runs in the host
# process, so the *real* Pi path does need it — but only that integration-
# gated path does. The governed-plane code, the unit tests, and the fake-
# harness e2e path never load it (the pi binding's default factories import
# the wrapper lazily). Keeping it an ignored missing peer leaves it out of the
# default trust surface; a runner that wants the live local-swarm path adds it
# explicitly. Same rationale as claude-agent-sdk above.
#
# @ai-sdk/sandbox-just-bash pins its just-bash peer to ^2.14.0; this repo
# already depends on just-bash 3.0.1 (the hermetic backend). The sandbox
# wrapper is only reached on the integration-gated real Pi path, which is
# verified against the installed just-bash separately, so the single repo
# version is accepted here rather than carrying two major lines of the same
# interpreter.
#
# @anthropic-ai/claude-agent-sdk declares SDK peers used by optional live MCP /
# provider integrations. The local test and FusionKit panel paths exercise the
# CLI/Agent SDK boundary without loading those peer packages on the host, so
# they stay out of the default workspace install.
peerDependencyRules:
  ignoreMissing:
    - "@anthropic-ai/claude-agent-sdk"
    - "@anthropic-ai/sdk"
    - "@earendil-works/pi-coding-agent"
    - "@modelcontextprotocol/sdk"
  allowedVersions:
    "@ai-sdk/sandbox-just-bash>just-bash": "3.0.1"
