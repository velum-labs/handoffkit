# k=1 round-1 fused panel (see ../preregistration.md before changing anything).
#
# Members are the validated-OSS choices from the seed-audit / Phase-0 record:
#   - terminus: deepseek-v3.1-terminus — VALID at 32k (0/60 truncated,
#     analysis/seed-audit-32k/report.md)
#   - qwen3: qwen3-coder — non-thinking, measured cleanly in Phase 0
#     (analysis/phase0/c3_transfer_report.md)
# kimi-k2-thinking (the product default) is deliberately excluded: declared
# not measurable at practical budgets (truncation through 64k).
#
# Judge/synthesizer = terminus (strongest validated member). Family overlap
# with one panel member is a recorded limitation in the preregistration;
# candidates are anonymized and order-randomized by the engine, so the
# exposure is stylistic self-preference only.
#
# Boot:
#   uv run --package fusionkit fusionkit serve \
#     -c analysis/k1-round1/config/panel.yaml --host 127.0.0.1 --port 8080
#
# The fused system is the OpenAI-compatible model id `fusionkit/panel`.
# Per-endpoint ids (`terminus`, `qwen3`) are passthrough, not fused.
endpoints:
  - id: terminus
    provider: openrouter
    model: deepseek/deepseek-v3.1-terminus
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    capabilities:
      structured_output: false
      tool_calls: true
      streaming: true
    tags: [cloud, oss, peer]
    timeout_s: 600
  - id: qwen3
    provider: openrouter
    model: qwen/qwen3-coder
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    capabilities:
      structured_output: false
      tool_calls: true
      streaming: true
    tags: [cloud, oss, peer]
    timeout_s: 600
default_model: terminus
judge_model: terminus
synthesizer_model: terminus
default_mode: panel
panel_models: [terminus, qwen3]
# k=1 commit semantics on the text-protocol (tools-absent) path: the judge
# names one candidate and its content is returned VERBATIM (no synthesizer
# rewrite). terminus-2 speaks structured JSON in plain text, so a rewrite
# could merge command batches across candidates — exactly what step mode
# forbids for tool batches. If the judge names no best candidate (null), the
# engine falls back to composition; those steps are counted from traces.
synthesis_select_best: true
# Step-framed prompts, pinned explicitly (preregistration amendment 3).
# Why pinned: (a) terminus-2 sends no `tools` field, so the engine would use
# the trajectory-mode prompts, which ask "which candidate is the best
# ANSWER" — the epistemically wrong question at a step boundary; these
# adapt main's step-mode framing ("which proposed NEXT STEP should be
# committed") to text-encoded command batches. (b) Fields left unset would
# silently bind to the committed .fusionkit/prompts/*.md files (the config
# loader applies them by CWD); pinning both fields removes that dependency.
# The judge JSON contract (the seven keys) must match parse_analysis and is
# copied exactly from the built-in prompts.
prompts:
  judge_system: |
    You compare candidate NEXT-STEP proposals for a local model fusion system.
    Each candidate is one model's proposal for the next step of the SAME in-progress request:
    either a final answer, or one batch of actions (for example terminal commands, possibly encoded
    in a structured text format the caller's harness parses) that the harness would execute next.
    Return only valid JSON with these keys:
    consensus, contradictions, unique_insights, coverage_gaps, likely_errors,
    recommended_final_structure, best_trajectory.
    Each of the first six values must be an array of concise strings. ``best_trajectory`` is the id
    string (as labeled "Trajectory <id> from model ...") of the single candidate whose proposed next
    step is the best one to commit. Committing adopts one candidate's proposal verbatim, so when
    several candidates propose an equally good step, still name one of them (never null for a tie);
    return null only if no candidate proposes a good step and a direct text answer should be
    composed instead.
  synthesizer_system: |
    You are the assistant responding directly to the user, committing the next step of an
    in-progress request. You are given several candidate proposals for that next step: each is a
    different model's suggestion (a final answer, or a batch of actions such as terminal commands,
    possibly encoded in a structured text format the caller's harness parses), plus a structured
    judge analysis. Commit exactly ONE step:
    - To act: adopt the proposal of exactly ONE candidate, verbatim and whole - reproduce its
      message unchanged, including any structured format it used. Never merge actions across
      candidates, never rewrite their arguments, and never invent actions no candidate proposed.
    - To answer: reply with the final text answer (you may merge insights across candidates for
      text).
    Do NOT describe the candidates, the proposals, or the fusion process; just respond as the
    assistant.
sampling:
  temperature: 0.2
  top_p: 0.95
  # Per-step completion cap. Steps are single proposals (a command batch or a
  # final answer), not whole solutions; the truncation audit in the
  # preregistration counts rows that hit this cap.
  max_tokens: 8192
budget:
  max_candidates: 2
  wall_clock_s: 1800
