# Intentionally an isolated, single-package pnpm workspace root.
#
# apps/scope is deliberately NOT a member of the handoffkit root workspace
# (the root only globs packages/* and examples/*). Declaring this empty
# workspace here makes pnpm treat apps/scope as its own root, so it does not
# walk up into the monorepo's strict .npmrc (save-exact, strict peers,
# minimum-release-age) or its build graph. The local dashboard stays a plain,
# self-contained Next.js app.
packages: []

# Allow the native postinstall for these to run (tsx's bundled esbuild and
# next/image's sharp). Everything else stays script-free.
onlyBuiltDependencies:
  - esbuild
  - sharp
