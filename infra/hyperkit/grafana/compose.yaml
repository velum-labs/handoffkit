name: hyperkit-observability

services:
  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      # Accept OTLP metrics from local hyperkit runs (runner telemetry +
      # local-controller CellSnapshot gauges) on /api/v1/otlp/v1/metrics.
      - --web.enable-otlp-receiver
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-19090}:9090"
    volumes:
      - ./local/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./local/seed-rules.yml:/etc/prometheus/seed-rules.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/ready"]
      interval: 2s
      timeout: 2s
      retries: 30

  grafana:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-13000}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_PLUGINS_DISABLE_PLUGINS: grafana-lokiexplore-app
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-validation-only}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./local/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 2s
      timeout: 2s
      retries: 30
