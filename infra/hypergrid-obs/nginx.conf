# Basic-auth front door for Prometheus: OTLP ingest + query API.
# Only the SHA-512-crypt hash ships in the bundle; the plaintext lives in
# SSM Parameter Store (see deploy.py).
server {
    listen 9090;

    location / {
        auth_basic "hypergrid";
        auth_basic_user_file /etc/nginx/htpasswd;
        proxy_pass http://prometheus:9090;
        proxy_read_timeout 120s;
        client_max_body_size 32m;
    }
}
