# Basic-auth front door for Prometheus: OTLP ingest + query API.
# The htpasswd hash is generated ON the instance at boot from the SSM
# SecureString (see deploy.py); no credential material ships in the bundle.
server {
    listen 9090;

    location / {
        auth_basic "hypergrid";
        auth_basic_user_file /etc/nginx/htpasswd;
        proxy_pass http://prometheus:9090;
        proxy_read_timeout 120s;
        client_max_body_size 32m;
    }
}
