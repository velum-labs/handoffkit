# Experiment E3 — multi-sample panel, Gemini judge.
#
# Panel mode ignores sample_count (generate_panel issues one call per member),
# so multi-sampling is implemented as duplicated endpoint ids for the two
# strongest measured members: gemini x2 + kimi x2 + dsv4pro. Goal: harvest the
# observed +/-3-task per-model sampling variance into the candidate oracle
# without adding new (weaker) families.
#
# Requires OPENROUTER_API_KEY.
endpoints:
  - id: gemini_a
    provider: openrouter
    model: google/gemini-3.1-pro-preview
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    timeout_s: 600
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 2.0
      output_per_1m_tokens: 12.0
      currency: USD
    tags: [closed, panel]
  - id: gemini_b
    provider: openrouter
    model: google/gemini-3.1-pro-preview
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    timeout_s: 600
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 2.0
      output_per_1m_tokens: 12.0
      currency: USD
    tags: [closed, panel]
  - id: kimi_a
    provider: openrouter
    model: moonshotai/kimi-k2.7-code
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    timeout_s: 600
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 0.74
      output_per_1m_tokens: 3.5
      currency: USD
    tags: [oss, panel]
  - id: kimi_b
    provider: openrouter
    model: moonshotai/kimi-k2.7-code
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    timeout_s: 600
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 0.74
      output_per_1m_tokens: 3.5
      currency: USD
    tags: [oss, panel]
  - id: dsv4pro
    provider: openrouter
    model: deepseek/deepseek-v4-pro
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    timeout_s: 600
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 0.435
      output_per_1m_tokens: 0.87
      currency: USD
    tags: [oss, panel]
default_model: gemini_a
judge_model: gemini_a
synthesizer_model: gemini_a
default_mode: panel
panel_models: [gemini_a, gemini_b, kimi_a, kimi_b, dsv4pro]
harness_prompt_passthrough: true
sampling:
  temperature: 0.2
  top_p: 0.95
  max_tokens: 8192
budget:
  max_candidates: 5
  wall_clock_s: 1800
  max_cost: null
  max_tool_rounds: 24
  max_tool_calls: 200
