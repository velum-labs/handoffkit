# H1 backbone — honest top-3 shortlist panel (clean-room Phase A).
#
# OpenRouter OSS panel for fusion benchmarking. Judge and synthesizer are the
# strongest panel member (ds32), per the in-panel judge constraint.
#
#   FUSIONKIT_BENCH_CONFIG=configs/benchmark-panel.h1-backbone.yaml \
#     uv run fusionkit public-bench --suite livecodebench --subset 5 \
#       --runner-command "uv run python python/fusionkit-evals/src/fusionkit_evals/adapters/livecodebench_adapter.py"
#
# Requires OPENROUTER_API_KEY.
endpoints:
  - id: ds32
    provider: openrouter
    model: deepseek/deepseek-v3.2
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 0.2288
      output_per_1m_tokens: 0.3432
      currency: USD
    tags: [oss, panel]
  - id: nemotron3s
    provider: openrouter
    model: nvidia/nemotron-3-super-120b-a12b
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 0.08
      output_per_1m_tokens: 0.45
      currency: USD
    tags: [oss, panel]
  - id: dsv4pro
    provider: openrouter
    model: deepseek/deepseek-v4-pro
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 0.435
      output_per_1m_tokens: 0.87
      currency: USD
    tags: [oss, panel]
default_model: ds32
judge_model: ds32
synthesizer_model: ds32
default_mode: panel
panel_models: [ds32, nemotron3s, dsv4pro]
harness_prompt_passthrough: true
sampling:
  temperature: 0.2
  top_p: 0.95
  max_tokens: 8192
budget:
  max_candidates: 3
  wall_clock_s: 1800
  max_cost: null
  max_tool_rounds: 24
  max_tool_calls: 200
