# Deep two-member panel for fusion benchmarking: GPT-5.5 + Claude Opus 4.8 with
# 3 temperature-varied samples per member (pool of 6 candidates per task).
#
# Rationale (audit 20260701-2027, phase 3/4): with 1 sample per member the
# candidate-only oracle ceiling was best-single +7.0 pts and only 15/86 tasks
# were judge-decidable. Temperature diversity raises the pool oracle and the
# number of decision tasks, which is where judge+synthesis converts headroom
# into wins. The primary (first) sample per member runs at the base temperature
# (0.2), so each member's pass@1 baseline stays apples-to-apples with the
# classic panel.
#
# Requires OPENAI_API_KEY and ANTHROPIC_API_KEY in the environment.
endpoints:
  - id: gpt
    provider: openai
    model: gpt-5.5
    base_url: https://api.openai.com
    api_key_env: OPENAI_API_KEY
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 1.25
      output_per_1m_tokens: 10.0
      currency: USD
    tags: [cloud, peer]
  - id: opus
    provider: anthropic
    model: claude-opus-4-8
    base_url: https://api.anthropic.com
    api_key_env: ANTHROPIC_API_KEY
    capabilities:
      structured_output: false
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 5.0
      output_per_1m_tokens: 25.0
      currency: USD
    tags: [cloud, peer]
default_model: gpt
judge_model: gpt
synthesizer_model: gpt
default_mode: panel
panel_models: [gpt, opus]
panel_samples_per_model: 3
self_temperatures: [0.2, 0.6, 0.9]
harness_prompt_passthrough: true
# Audit 20260701-2027 phase 4/5 ablation: judge-pick-verbatim ties LLM-rewrite on
# pass rate on both banks (86-task locked-window bank and 150-task deep dev bank)
# while taking zero McNemar losses vs best-single, zero synthesis regressions,
# and skipping the synthesizer call whenever the judge names a pick (~71% of
# tasks) — strictly cheaper at equal quality on code. Falls back to rewrite
# composition when no pick is named (that fallback rescued 5/150 dev tasks where
# every candidate failed).
synthesis_select_best: true
sampling:
  temperature: 0.2
  top_p: 0.95
  max_tokens: 4096
budget:
  max_candidates: 6
  wall_clock_s: 1800
  max_cost: null
  max_tool_rounds: 24
  max_tool_calls: 200
