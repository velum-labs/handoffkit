# Judge experiment J1-M — deepseek backbone, MiMo judge.
#
# Panel: deepseek-v4-pro + mimo-v2.5-pro + gemini-3.1-pro
# Pair of J1-G; only judge/synthesizer swap (mimo vs gemini).
#
# Requires OPENROUTER_API_KEY.
endpoints:
  - id: dsv4pro
    provider: openrouter
    model: deepseek/deepseek-v4-pro
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    timeout_s: 600
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 0.435
      output_per_1m_tokens: 0.87
      currency: USD
    tags: [oss, panel]
  - id: mimo
    provider: openrouter
    model: xiaomi/mimo-v2.5-pro
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    timeout_s: 600
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 0.435
      output_per_1m_tokens: 0.87
      currency: USD
    tags: [oss, panel]
  - id: gemini
    provider: openrouter
    model: google/gemini-3.1-pro-preview
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    timeout_s: 600
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 2.0
      output_per_1m_tokens: 12.0
      currency: USD
    tags: [closed, panel]
default_model: mimo
judge_model: mimo
synthesizer_model: mimo
default_mode: panel
panel_models: [dsv4pro, mimo, gemini]
harness_prompt_passthrough: true
sampling:
  temperature: 0.2
  top_p: 0.95
  max_tokens: 8192
budget:
  max_candidates: 3
  wall_clock_s: 1800
  max_cost: null
  max_tool_rounds: 24
  max_tool_calls: 200
