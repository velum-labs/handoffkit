# H5 thinking-heavy — 64k completion budgets on reasoning-class members.
#
#   FUSIONKIT_BENCH_CONFIG=configs/benchmark-panel.h5-thinking-heavy.yaml \
#     uv run fusionkit public-bench --suite livecodebench --subset 5 \
#       --runner-command "uv run python python/fusionkit-evals/src/fusionkit_evals/adapters/livecodebench_adapter.py"
#
# Requires OPENROUTER_API_KEY.
endpoints:
  - id: ds32_64k
    provider: openrouter
    model: deepseek/deepseek-v3.2
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 0.2288
      output_per_1m_tokens: 0.3432
      currency: USD
    tags: [oss, panel, thinking]
  - id: kimi26_64k
    provider: openrouter
    model: moonshotai/kimi-k2.6
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 0.66
      output_per_1m_tokens: 3.41
      currency: USD
    tags: [oss, panel, thinking]
  - id: nemotron3s_64k
    provider: openrouter
    model: nvidia/nemotron-3-super-120b-a12b
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 0.08
      output_per_1m_tokens: 0.45
      currency: USD
    tags: [oss, panel]
default_model: ds32_64k
judge_model: ds32_64k
synthesizer_model: ds32_64k
default_mode: panel
panel_models: [ds32_64k, kimi26_64k, nemotron3s_64k]
harness_prompt_passthrough: true
sampling:
  temperature: 0.2
  top_p: 0.95
  max_tokens: 32768
budget:
  max_candidates: 3
  wall_clock_s: 3600
  max_cost: null
  max_tool_rounds: 24
  max_tool_calls: 200
