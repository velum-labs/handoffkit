# Maintainer-only fusionkit-evals / internal sidecar configuration.
#
# GPT-5.5 + Claude Opus 4.8 are opaque RouteKit endpoint IDs here. Their model,
# URL, dialect, and apiKeyEnv settings live in a RouteKit router config such as
# configs/benchmark-router.example.yaml.
#
#   routekit --config configs/benchmark-router.example.yaml serve --no-portless --port 8787
#   FUSIONKIT_BENCH_CONFIG=configs/benchmark-panel.gpt-opus.yaml \
#     uv run --package fusionkit-evals fusionkit-bench public ...
routekit_url: http://127.0.0.1:8787
endpoint_ids:
  - gpt
  - opus
default_model: gpt
judge_model: gpt
synthesizer_model: gpt
default_mode: panel
panel_models:
  - gpt
  - opus
harness_prompt_passthrough: true
sampling:
  temperature: 0.2
  top_p: 0.95
  max_tokens: 4096
budget:
  max_candidates: 2
  wall_clock_s: 1800
  max_tool_rounds: 24
  max_tool_calls: 200
