# Maintainer-only fusionkit-evals / internal sidecar configuration.
#
# GPT-5.5 + Claude Opus 4.8 use stable namespaced RouteKit model IDs here.
# Provider URLs and credentials live in RouteKit.
# configs/benchmark-router.example.yaml.
#
#   routekit --config configs/benchmark-router.example.yaml serve --no-portless --port 8787
#   FUSIONKIT_BENCH_CONFIG=configs/benchmark-panel.gpt-opus.yaml \
#     uv run --package fusionkit-evals fusionkit-bench public ...
routekit_url: http://127.0.0.1:8787
routekit_model_ids:
  - openai/gpt-5.5
  - anthropic/claude-opus-4-8
default_model: openai/gpt-5.5
judge_model: openai/gpt-5.5
synthesizer_model: openai/gpt-5.5
default_mode: panel
panel_models:
  - openai/gpt-5.5
  - anthropic/claude-opus-4-8
harness_prompt_passthrough: true
sampling:
  temperature: 0.2
  top_p: 0.95
  max_tokens: 4096
budget:
  max_candidates: 2
  wall_clock_s: 1800
  max_tool_rounds: 24
  max_tool_calls: 200
