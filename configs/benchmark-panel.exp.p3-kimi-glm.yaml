# Experiment P3 — best measured member + best new family, Gemini judge.
#
# Panel: gemini-3.1-pro + kimi-k2.7-code + glm-5.2 (hedge between P1 and P2:
# keeps the strongest measured non-gemini member and adds the GLM family).
#
# Requires OPENROUTER_API_KEY.
endpoints:
  - id: gemini
    provider: openrouter
    model: google/gemini-3.1-pro-preview
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    timeout_s: 600
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 2.0
      output_per_1m_tokens: 12.0
      currency: USD
    tags: [closed, panel]
  - id: kimi
    provider: openrouter
    model: moonshotai/kimi-k2.7-code
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    timeout_s: 600
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 0.74
      output_per_1m_tokens: 3.5
      currency: USD
    tags: [oss, panel]
  - id: glm52
    provider: openrouter
    model: z-ai/glm-5.2
    base_url: https://openrouter.ai/api
    api_key_env: OPENROUTER_API_KEY
    timeout_s: 600
    capabilities:
      structured_output: true
      tool_calls: true
      streaming: true
    pricing:
      input_per_1m_tokens: 0.909
      output_per_1m_tokens: 2.856
      currency: USD
    tags: [oss, panel]
default_model: gemini
judge_model: gemini
synthesizer_model: gemini
default_mode: panel
panel_models: [gemini, kimi, glm52]
harness_prompt_passthrough: true
sampling:
  temperature: 0.2
  top_p: 0.95
  max_tokens: 8192
budget:
  max_candidates: 3
  wall_clock_s: 1800
  max_cost: null
  max_tool_rounds: 24
  max_tool_calls: 200
