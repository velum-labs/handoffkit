# Internal fusion-sidecar / fusionkit-evals schema.
#
# This is not accepted by the public `fusionkit serve` command. The Node CLI
# reads `.fusionkit/fusion.json` v4, starts RouteKit, and generates this
# namespaced-model-only sidecar configuration internally.
#
# For direct maintainer use, start the matching RouteKit gateway first:
#
#   routekit --config configs/benchmark-router.example.yaml serve --no-portless --port 8787
routekit_url: http://127.0.0.1:8787
routekit_model_ids:
  - openai/gpt-5.5
  - anthropic/claude-opus-4-8
  - google/gemini-3-pro
default_model: openai/gpt-5.5
judge_model: openai/gpt-5.5
synthesizer_model: openai/gpt-5.5
default_mode: panel
panel_models:
  - openai/gpt-5.5
  - anthropic/claude-opus-4-8
  - google/gemini-3-pro
sampling:
  temperature: 0.2
  top_p: 0.95
  max_tokens: 4096
budget:
  max_candidates: 3
  wall_clock_s: 1800
  max_tool_rounds: 24
  max_tool_calls: 200
