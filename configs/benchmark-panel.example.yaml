# Maintainer-only fusionkit-evals / internal sidecar configuration.
#
# Provider URLs and credentials belong to RouteKit. Start the example router:
#
#   routekit --config configs/benchmark-router.example.yaml serve --no-portless --port 8787
#
# Then pass this file to `fusionkit-bench --config` or set
# FUSIONKIT_BENCH_CONFIG. It is not a public `fusionkit serve` config.
routekit_url: http://127.0.0.1:8787
routekit_model_ids:
  - openai/gpt-5.5
  - anthropic/claude-opus-4-8
  - google/gemini-3-pro
default_model: openai/gpt-5.5
judge_model: openai/gpt-5.5
synthesizer_model: openai/gpt-5.5
default_mode: panel
panel_models:
  - openai/gpt-5.5
  - anthropic/claude-opus-4-8
  - google/gemini-3-pro
sampling:
  temperature: 0.2
  top_p: 0.95
  max_tokens: 4096
budget:
  max_candidates: 3
  wall_clock_s: 1800
  max_tool_rounds: 24
  max_tool_calls: 200
