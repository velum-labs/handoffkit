# Current RouteKit router schema. Use with:
#
#   routekit --config configs/models.example.yaml serve --no-portless --port 8787
#
# Fusion v4 references live namespaced provider/model ids. Provider URLs,
# credentials, wire protocols, and discovery metadata come from the registry.
providers:
  openai: {}
  anthropic: {}
  google: {}
  openrouter: {}

  # Start CLIProxyAPI separately, then enable its live catalog with:
  #   routekit providers add cliproxy
  cliproxy: {}

  # Import any number of named official CLI logins before serving:
  #   routekit accounts add claude-code --name personal
  #   routekit accounts add claude-code --name work
  claude-code:
    strategy: capacity_weighted
    switchThreshold: 0.9

  #   routekit accounts add codex --name personal
  #   routekit accounts add codex --name work
  codex:
    strategy: capacity_weighted
    switchThreshold: 0.9

defaultModel: openai/gpt-5.5
