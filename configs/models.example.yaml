# Current RouteKit router schema. Use with:
#
#   routekit --config configs/models.example.yaml serve --no-portless --port 8787
#
# Fusion v4 references live namespaced provider/model ids. Provider URLs,
# credentials, wire protocols, and discovery metadata come from the registry.
providers:
  openai: {}
  anthropic: {}
  openrouter: {}

  # Log in any number of named accounts through isolated official CLI profiles:
  #   routekit accounts login claude-code --name personal
  #   routekit accounts login claude-code --name work
  claude-code:
    strategy: capacity_weighted
    switchThreshold: 0.9

  #   routekit accounts login codex --name personal
  #   routekit accounts login codex --name work
  codex:
    strategy: capacity_weighted
    switchThreshold: 0.9

defaultModel: openai/gpt-5.5
