name: Release packages

on:
  push:
    tags:
      - "handoffkit-v*"
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    name: build, test, and publish npm workspaces
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.repository == 'velum-labs/handoffkit'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
          scope: "@warrant"

      - name: Enable Corepack
        run: corepack enable

      - name: Pin pnpm
        run: corepack prepare pnpm@10.33.4 --activate

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Validate release metadata
        run: node scripts/check-release-publish.mjs

      - name: Check
        run: corepack pnpm check

      - name: Build
        run: corepack pnpm build

      - name: Test
        run: corepack pnpm test

      - name: Configure GitHub Packages auth
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "@warrant:registry=https://npm.pkg.github.com" >> "$HOME/.npmrc"
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> "$HOME/.npmrc"

      - name: Dry-run package tarballs
        if: github.event_name == 'workflow_dispatch'
        run: node scripts/publish-npm-workspaces.mjs --dry-run

      - name: Publish packages to GitHub Packages
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/publish-npm-workspaces.mjs
