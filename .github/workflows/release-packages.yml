name: Release packages

on:
  # Publishing is gated behind a published GitHub Release (not a bare tag push),
  # so the release notes + tag are reviewed before anything ships. The release
  # tag must match handoffkit-v* or v* (enforced in "Validate release tag").
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  id-token: write

# Mirrors ci.yml: lets pnpm read the repo .npmrc (the @velum-labs private
# protocol devDep) so the resolved peer-dependency settings match the lockfile.
env:
  PACKAGES_READ_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || github.token }}

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    name: build, test, and publish npm workspaces
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.repository == 'velum-labs/handoffkit'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          scope: "@fusionkit"

      - name: Enable Corepack
        run: corepack enable

      - name: Pin pnpm
        run: corepack prepare pnpm@10.33.4 --activate

      # `pnpm publish` performs the npm OIDC exchange via the npm CLI, which must
      # be >= 11.5.1 for trusted publishing. Once a Trusted Publisher is
      # configured on npmjs.com, publishing uses OIDC automatically and the
      # NPM_TOKEN below is no longer used (it remains only as a bootstrap
      # fallback for the very first publish, before the packages exist).
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Validate release tag
        if: github.event_name == 'release'
        run: |
          case "${{ github.event.release.tag_name }}" in
            handoffkit-v*|v*) echo "release tag ${{ github.event.release.tag_name }} ok" ;;
            *) echo "release tag must match handoffkit-v* or v*"; exit 1 ;;
          esac

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Validate release metadata
        run: node scripts/check-release-publish.mjs

      - name: Check
        run: corepack pnpm check

      - name: Build
        run: corepack pnpm build

      - name: Test
        run: corepack pnpm test

      - name: Configure npm registry auth
        if: github.event_name == 'release'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> "$HOME/.npmrc"

      - name: Dry-run package tarballs
        if: github.event_name == 'workflow_dispatch'
        run: node scripts/publish-npm-workspaces.mjs --dry-run

      - name: Publish packages to npm
        if: github.event_name == 'release'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish-npm-workspaces.mjs
