name: Release packages

on:
  # Publishing is gated behind a published GitHub Release (not a bare tag push),
  # so the release notes + tag are reviewed before anything ships. The release
  # tag must match handoffkit-v* or v* (enforced in "Validate release tag").
  release:
    types: [published]
  # Recovery-only trigger for an already-published release whose original
  # workflow failed before upload. Remove after the recovery run succeeds.
  push:
    tags:
      - "npm-recovery-v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish after validation (recovery only)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    name: build, test, and publish npm workspaces
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.repository == 'velum-labs/handoffkit'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # No registry-url/scope here on purpose: setup-node's registry-url writes a
      # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` line into .npmrc; a
      # present (or empty) token makes npm use token auth and SHADOWS OIDC trusted
      # publishing. publish-npm-workspaces.mjs passes --registry/--access
      # explicitly and publishes token-free via OIDC.
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Pin pnpm
        run: corepack prepare pnpm@10.33.4 --activate

      # The publish step normally performs the npm OIDC exchange via the npm
      # CLI, which must be >= 11.5.1 for trusted publishing. A short-lived
      # NPM_TOKEN is accepted only to bootstrap package names that do not yet
      # exist and therefore cannot have a Trusted Publisher configured.
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Validate release tag
        if: github.event_name == 'release'
        run: |
          case "${{ github.event.release.tag_name }}" in
            handoffkit-v*|v*) echo "release tag ${{ github.event.release.tag_name }} ok" ;;
            *) echo "release tag must match handoffkit-v* or v*"; exit 1 ;;
          esac

      - name: Validate recovery tag
        if: github.event_name == 'push'
        run: |
          case "${{ github.ref_name }}" in
            npm-recovery-v*) echo "recovery tag ${{ github.ref_name }} ok" ;;
            *) echo "recovery tag must match npm-recovery-v*"; exit 1 ;;
          esac

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Restore Turborepo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Validate release metadata
        run: node scripts/check-release-publish.mjs

      - name: Check
        run: corepack pnpm check

      - name: Build
        run: corepack pnpm exec turbo run build --filter='./packages/*' --filter='./examples/*'

      - name: Validate RouteKit clean install
        run: node scripts/check-routekit-cli-pack.mjs

      # Build the observability dashboard from the unified workspace, then stage
      # its Next standalone output into packages/cli/scope/ before validating
      # the FusionKit tarball.
      - name: Build observability dashboard (apps/scope)
        run: corepack pnpm exec turbo run build --filter=scope

      - name: Stage dashboard into CLI package
        run: node scripts/stage-scope.mjs

      - name: Validate FusionKit clean install
        run: node scripts/check-fusionkit-cli-pack.mjs --require-scope

      - name: Test
        run: corepack pnpm test

      - name: Dry-run package tarballs
        if: github.event_name == 'workflow_dispatch' && inputs.publish != true
        run: node scripts/publish-npm-workspaces.mjs --dry-run

      - name: Publish packages to npm
        if: github.event_name == 'release' || github.event_name == 'push' || inputs.publish == true
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NODE_AUTH_TOKEN}" ]; then
            echo "Publishing with the short-lived npm bootstrap token"
            bootstrap_config="${RUNNER_TEMP}/npm-bootstrap.npmrc"
            trap 'rm -f "${bootstrap_config}"' EXIT
            umask 077
            printf '%s\n' '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' > "${bootstrap_config}"
            NPM_CONFIG_USERCONFIG="${bootstrap_config}" node scripts/publish-npm-workspaces.mjs
          else
            echo "Publishing via npm OIDC trusted publishing"
            node scripts/publish-npm-workspaces.mjs
          fi
