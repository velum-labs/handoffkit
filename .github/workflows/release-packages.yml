name: Release packages

on:
  # Publishing is gated behind a published GitHub Release (not a bare tag push),
  # so the release notes + tag are reviewed before anything ships. The release
  # tag must match handoffkit-v* or v* (enforced in "Validate release tag").
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    name: build, test, and publish npm workspaces
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.repository == 'velum-labs/handoffkit'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # No registry-url/scope here on purpose: setup-node's registry-url writes a
      # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` line into .npmrc; a
      # present (or empty) token makes npm use token auth and SHADOWS OIDC trusted
      # publishing. publish-npm-workspaces.mjs passes --registry/--access
      # explicitly and publishes token-free via OIDC.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Pin pnpm
        run: corepack prepare pnpm@10.33.4 --activate

      # The publish step performs the npm OIDC exchange via the npm CLI, which
      # must be >= 11.5.1 for trusted publishing. Trusted Publishers for the
      # @routekit/* and @fusionkit/* packages are configured on npmjs.com, so
      # publishing is token-free via OIDC (provenance is emitted automatically).
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Validate release tag
        if: github.event_name == 'release'
        run: |
          case "${{ github.event.release.tag_name }}" in
            handoffkit-v*|v*) echo "release tag ${{ github.event.release.tag_name }} ok" ;;
            *) echo "release tag must match handoffkit-v* or v*"; exit 1 ;;
          esac

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Validate release metadata
        run: node scripts/check-release-publish.mjs

      - name: Check
        run: corepack pnpm check

      - name: Build
        run: corepack pnpm build

      - name: Validate RouteKit clean install
        run: node scripts/check-routekit-cli-pack.mjs

      - name: Validate FusionKit clean install
        run: node scripts/check-fusionkit-cli-pack.mjs

      - name: Test
        run: corepack pnpm test

      # The observability dashboard (apps/scope) is an isolated workspace with
      # its own lockfile; install + build it, then stage the Next standalone
      # output into packages/cli/scope/ so the published @fusionkit/cli ships a
      # working `--observe` out of the box (cli files: ["dist", "scope"]).
      - name: Build observability dashboard (apps/scope)
        working-directory: apps/scope
        run: |
          corepack pnpm install --frozen-lockfile
          corepack pnpm build

      - name: Stage dashboard into CLI package
        run: node scripts/stage-scope.mjs

      - name: Dry-run package tarballs
        if: github.event_name == 'workflow_dispatch'
        run: node scripts/publish-npm-workspaces.mjs --dry-run

      - name: Publish packages to npm
        if: github.event_name == 'release'
        # No NODE_AUTH_TOKEN: publishing is via OIDC trusted publishing.
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/publish-npm-workspaces.mjs
