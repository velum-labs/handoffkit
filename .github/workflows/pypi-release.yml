name: Release fusionkit to PyPI

on:
  # Publishing is gated behind a published GitHub Release (not a bare tag push).
  # The release tag must match fusionkit-v* (enforced in "Validate release tag").
  release:
    types: [published]
  # Recovery-only trigger for an already-published release whose original
  # workflow failed before upload. Remove after the recovery run succeeds.
  push:
    tags:
      - "pypi-recovery-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and validate distributions without publishing"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: pypi-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: build, validate, and publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only the canonical repository may publish.
    if: github.repository == 'velum-labs/handoffkit'
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Validate release tag
        if: github.event_name == 'release'
        run: |
          case "${{ github.event.release.tag_name }}" in
            fusionkit-v*) echo "release tag ${{ github.event.release.tag_name }} ok" ;;
            *) echo "release tag must match fusionkit-v*"; exit 1 ;;
          esac

      - name: Validate recovery tag
        if: github.event_name == 'push'
        run: |
          case "${{ github.ref_name }}" in
            pypi-recovery-v*) echo "recovery tag ${{ github.ref_name }} ok" ;;
            *) echo "recovery tag must match pypi-recovery-v*"; exit 1 ;;
          esac

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Lockfile is current
        run: uv lock --check

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Lint and type-check
        run: |
          uv run ruff check .
          uv run pyright

      - name: Test
        run: uv run pytest

      - name: Build fusionkit distributions
        run: node scripts/build-fusionkit-python-packages.mjs

      - name: Validate distribution metadata
        run: uv run --with twine python -m twine check dist/*

      - name: Validate installed console scripts
        run: |
          uv venv .release-venv
          uv pip install --python .release-venv/bin/python --no-deps dist/*.whl
          test -x .release-venv/bin/fusionkit-sidecar
          test -x .release-venv/bin/fusionkit-bench
          if test -e .release-venv/bin/fusionkit; then
            echo "the Python distributions must not install a fusionkit executable"
            exit 1
          fi

      - name: Publish to PyPI
        # Published releases publish by default. A manual dispatch publishes
        # only when dry_run=false, which provides an idempotent recovery path
        # after the release event has already fired. Uses an API token when
        # PYPI_TOKEN is set (the one-time bootstrap, before Trusted Publishers
        # can be attached to not-yet-existing projects); otherwise authenticates
        # via OIDC trusted publishing. Remove PYPI_TOKEN after every project has
        # its Trusted Publisher configured.
        if: github.event_name == 'release' || github.event_name == 'push' || inputs.dry_run == false
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          # --check-url makes re-runs idempotent: uv skips files already on the
          # index and only uploads what's missing (e.g. after a partial publish
          # that tripped PyPI's new-project rate limit).
          if [ -n "${UV_PUBLISH_TOKEN}" ]; then
            echo "Publishing to PyPI with an API token (bootstrap)"
            uv publish --check-url https://pypi.org/simple/
          else
            echo "Publishing to PyPI via OIDC trusted publishing"
            unset UV_PUBLISH_TOKEN
            uv publish --trusted-publishing always --check-url https://pypi.org/simple/
          fi
