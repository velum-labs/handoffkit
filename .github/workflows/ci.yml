name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check, build, test, demos
    runs-on: ubuntu-latest
    # Hard ceiling so a hung test cannot burn CI minutes; the suite normally
    # finishes in well under half of this.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Matches the pinned Dockerfile base image; bump them together.
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Pin pnpm
        # Must match package.json's packageManager and the Dockerfile.
        run: corepack prepare pnpm@10.33.4 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Standalone examples
        run: pnpm demo all

      - name: Performance budgets (spec section 8.4)
        run: pnpm bench

      - name: Audit dependencies
        run: pnpm audit --audit-level high

  python:
    name: uv workspace (python/*)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Lockfile is current
        run: uv lock --check

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Test
        run: uv run pytest python/uniroute/tests -q

      - name: Demo smoke
        run: uv run uniroute-demo --trials 1

  docker:
    name: docker compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build images
        run: docker compose build

      - name: Boot plane, runner, and seeder
        run: docker compose up -d --wait plane runner

      - name: Wait for seeded showcase runs
        run: |
          docker compose up seed
          # "done." is the seeder's documented completion line; asserting on
          # it is the smoke contract, and a failure dumps the full logs.
          docker compose logs seed | grep -q "done." || (docker compose logs && exit 1)

      - name: Smoke-test the API and control panel
        run: |
          # These assert stable, documented surface: the health/ready JSON
          # shapes are named constants in the plane and the UI title is part
          # of the control panel's contract.
          curl -fsS http://localhost:7172/v1/health
          curl -fsS http://localhost:7172/v1/ready | grep -q '"ready":true'
          curl -fsS http://localhost:7172/ui/ | grep -q "Warrant — Control Panel"
          TOKEN=$(docker compose exec plane warrant ui | grep "login token" | awk '{print $3}')
          curl -fsS -H "Authorization: Bearer $TOKEN" http://localhost:7172/v1/runs | grep -q '"runId"'
          curl -fsS -H "Authorization: Bearer $TOKEN" http://localhost:7172/v1/metrics | grep -q '"metrics"'
          docker compose exec plane warrant runs

      - name: Tear down
        if: always()
        run: docker compose down -v
