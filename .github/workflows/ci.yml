name: CI

# Fork-safety: CI uses plain `pull_request` triggers (never `pull_request_target`)
# and read-only permissions, so PRs from forks run without access to secrets.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check, build, test, demos
    runs-on: ubuntu-latest
    # Hard ceiling so a hung test cannot burn CI minutes; the suite normally
    # finishes in well under half of this.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Matches the pinned Dockerfile base image; bump them together.
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Pin pnpm
        # Must match package.json's packageManager and the Dockerfile.
        run: corepack prepare pnpm@10.33.4 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: OOTB CLI shape smoke
        run: node scripts/check-ootb-cli.mjs

      - name: Test
        run: pnpm test

      - name: Standalone examples
        run: pnpm demo all

      - name: Audit dependencies
        run: pnpm audit --audit-level high

  scope:
    name: scope observability app (apps/scope)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/scope
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Pin pnpm
        run: corepack prepare pnpm@10.33.4 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (type-checks the app)
        run: pnpm build

      - name: Test
        run: pnpm test

  python:
    name: uv workspace (python/*)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Lockfile is current
        run: uv lock --check

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run pyright

      - name: Test uniroute
        run: uv run pytest python -q

      - name: Test fusionkit
        run: uv run pytest tests -q

      - name: Validate model-fusion contracts
        run: |
          uv run python scripts/validate_contract_fixtures.py
          uv run python scripts/validate_protocol_package.py

      - name: Demo smoke
        run: uv run uniroute-demo --trials 1

      - name: Router CLI smoke
        run: uv run uniroute-mlx --help

      - name: Build distributions (PyPI metadata smoke)
        run: |
          rm -rf dist
          uv build --all-packages
          uv run --with twine python -m twine check dist/*
