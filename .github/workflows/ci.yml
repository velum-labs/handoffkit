name: CI

# Fork-safety: CI uses plain `pull_request` triggers (never `pull_request_target`)
# and read-only permissions, so PRs from forks run without access to secrets.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check, build, test, demos
    runs-on: ubuntu-latest
    # Hard ceiling so a hung test cannot burn CI minutes; the suite normally
    # finishes in well under half of this.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Matches the pinned Dockerfile base image; bump them together.
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Pin pnpm
        # Must match package.json's packageManager and the Dockerfile.
        run: corepack prepare pnpm@10.33.4 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: OOTB CLI shape smoke
        run: node scripts/check-ootb-cli.mjs

      - name: Test
        run: pnpm test

      - name: Standalone examples
        run: pnpm demo all

      - name: Performance budgets (spec section 8.4)
        run: pnpm bench

      - name: Audit dependencies
        run: pnpm audit --audit-level high

  python:
    name: uv workspace (python/*)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Lockfile is current
        run: uv lock --check

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run pyright

      - name: Test uniroute
        run: uv run pytest python -q

      - name: Test fusionkit
        run: uv run pytest tests -q

      - name: Validate model-fusion contracts
        run: |
          uv run python scripts/validate_contract_fixtures.py
          uv run python scripts/validate_protocol_package.py

      - name: Demo smoke
        run: uv run uniroute-demo --trials 1

      - name: Router CLI smoke
        run: uv run uniroute-mlx --help

      - name: Build distributions (PyPI metadata smoke)
        run: |
          rm -rf dist
          uv build --all-packages
          uv run --with twine python -m twine check dist/*

  docker:
    name: legacy Warrant docker compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build images
        run: docker compose -f legacy/docker/docker-compose.yml build

      - name: Boot plane, runner, and seeder
        run: docker compose -f legacy/docker/docker-compose.yml up -d --wait plane runner

      - name: Wait for seeded showcase runs
        run: |
          docker compose -f legacy/docker/docker-compose.yml up seed
          # "done." is the seeder's documented completion line; asserting on
          # it is the smoke contract, and a failure dumps the full logs.
          docker compose -f legacy/docker/docker-compose.yml logs seed | grep -q "done." || (docker compose -f legacy/docker/docker-compose.yml logs && exit 1)

      - name: Smoke-test the API and control panel
        run: |
          # These assert stable, documented surface: the health/ready JSON
          # shapes are named constants in the plane and the UI title is part
          # of the control panel's contract.
          curl -fsS http://localhost:7172/v1/health
          curl -fsS http://localhost:7172/v1/ready | grep -q '"ready":true'
          curl -fsS http://localhost:7172/ui/ | grep -q "Warrant — Control Panel"
          TOKEN=$(docker compose -f legacy/docker/docker-compose.yml exec plane warrant ui | grep "login token" | awk '{print $3}')
          curl -fsS -H "Authorization: Bearer $TOKEN" http://localhost:7172/v1/runs | grep -q '"runId"'
          curl -fsS -H "Authorization: Bearer $TOKEN" http://localhost:7172/v1/metrics | grep -q '"metrics"'
          docker compose -f legacy/docker/docker-compose.yml exec plane warrant runs

      - name: Tear down
        if: always()
        run: docker compose -f legacy/docker/docker-compose.yml down -v
