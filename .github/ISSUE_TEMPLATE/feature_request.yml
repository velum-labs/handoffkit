name: Feature request
description: Suggest an improvement to FusionKit
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior or API you want.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface area
      options:
        - RouteKit CLI / router
        - FusionKit CLI / gateway
        - Python synthesis sidecar
        - harness adapter
        - docs
        - other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional context, workarounds, or related tools.
