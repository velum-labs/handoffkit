version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - supply-chain

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - supply-chain

  - package-ecosystem: docker
    directory: /legacy/docker
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - supply-chain

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - supply-chain
